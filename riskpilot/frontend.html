<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RiskPilot Shadow Observer</title>
  <style>
    :root {
      --bg: #0a0f1f;
      --panel: #121a30;
      --panel-2: #1a2441;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --good: #34d399;
      --warn: #f59e0b;
      --bad: #f87171;
      --line: #243153;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      font-size: 13px;
      color: var(--warn);
    }
    .status.ok { color: var(--good); }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .label { color: var(--muted); font-size: 12px; }
    .value { font-size: 18px; margin-top: 3px; font-weight: 600; }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead { background: var(--panel-2); }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    th { color: var(--muted); font-weight: 600; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .muted { color: var(--muted); }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .table-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>RiskPilot Shadow Observer</h1>
        <div class="sub">Air-gapped observer feed from <span class="mono">shadow_live_forward_logs.csv</span></div>
      </div>
      <div id="status" class="status">Connecting...</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Total Events (session)</div>
        <div id="metric-total" class="value">0</div>
      </div>
      <div class="card">
        <div class="label">Avg Latency (s)</div>
        <div id="metric-latency" class="value">0.00</div>
      </div>
      <div class="card">
        <div class="label">Avg Slippage</div>
        <div id="metric-slip" class="value">0.00</div>
      </div>
      <div class="card">
        <div class="label">Last Exit Reason</div>
        <div id="metric-exit" class="value muted" style="font-size: 14px">-</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Signal Time</th>
            <th>Expected</th>
            <th>Actual</th>
            <th>Latency(s)</th>
            <th>Slippage</th>
            <th>MFE</th>
            <th>MAE</th>
            <th>Runner</th>
            <th>Exit</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="10" class="empty">Awaiting shadow executions...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const MAX_ROWS = 75;
    const rows = [];
    let reconnectTimer = null;

    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");
    const totalEl = document.getElementById("metric-total");
    const latencyEl = document.getElementById("metric-latency");
    const slipEl = document.getElementById("metric-slip");
    const exitEl = document.getElementById("metric-exit");

    function formatNum(value, digits = 2) {
      return typeof value === "number" && Number.isFinite(value) ? value.toFixed(digits) : "-";
    }

    function updateMetrics() {
      totalEl.textContent = rows.length.toString();
      if (rows.length === 0) {
        latencyEl.textContent = "0.00";
        slipEl.textContent = "0.00";
        exitEl.textContent = "-";
        exitEl.className = "value muted";
        return;
      }
      const avgLatency = rows.reduce((acc, r) => acc + (r.latencySec || 0), 0) / rows.length;
      const avgSlip = rows.reduce((acc, r) => acc + (r.slippage || 0), 0) / rows.length;
      latencyEl.textContent = formatNum(avgLatency);
      slipEl.textContent = formatNum(avgSlip);
      const lastExit = rows[0].exitReason || "-";
      exitEl.textContent = lastExit;
      exitEl.className = "value " + (lastExit.toUpperCase().includes("FAIL") ? "bad" : "muted");
    }

    function renderTable() {
      if (rows.length === 0) {
        rowsEl.innerHTML = '<tr><td colspan="10" class="empty">Awaiting shadow executions...</td></tr>';
        return;
      }
      rowsEl.innerHTML = rows.map((r) => {
        const latencyClass = (r.latencySec || 0) > 2 ? "bad" : "muted";
        const slipClass = Math.abs(r.slippage || 0) > 1 ? "bad" : "good";
        const runner = r.isRunner ? "Yes" : "No";
        const exitClass = (r.exitReason || "").toUpperCase().includes("FAIL") ? "bad" : "muted";
        return `
          <tr>
            <td class="mono muted">${r.id || "-"}</td>
            <td>${r.signalTime || "-"}</td>
            <td>${formatNum(r.expectedEntry)}</td>
            <td>${formatNum(r.actualEntry)}</td>
            <td class="${latencyClass}">${formatNum(r.latencySec)}</td>
            <td class="${slipClass}">${formatNum(r.slippage)}</td>
            <td>${formatNum(r.mfe)}</td>
            <td>${formatNum(r.mae)}</td>
            <td>${runner}</td>
            <td class="${exitClass}">${r.exitReason || "-"}</td>
          </tr>`;
      }).join("");
    }

    function onPayload(payload) {
      rows.unshift(payload);
      if (rows.length > MAX_ROWS) {
        rows.pop();
      }
      renderTable();
      updateMetrics();
    }

    function setStatus(text, ok) {
      statusEl.textContent = text;
      statusEl.className = "status" + (ok ? " ok" : "");
    }

    async function fetchInitialData() {
      try {
        const response = await fetch('/api/initial-data');
        const data = await response.json();
        console.log('Initial data loaded:', data);
        return data;
      } catch (error) {
        console.error('Failed to fetch initial data:', error);
        setStatus('API connection failed', false);
      }
    }

    function connect() {
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${protocol}://${location.host}/ws`);

      ws.onopen = () => {
        setStatus("Connected", true);
        console.log('WebSocket connected successfully');
      };
      
      ws.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          console.log('Received payload:', payload);
          onPayload(payload);
        } catch (error) {
          console.error('Failed to parse WebSocket message:', error, 'Data:', event.data);
        }
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        setStatus("Socket error", false);
      };
      
      ws.onclose = (event) => {
        console.log('WebSocket closed:', event);
        setStatus("Disconnected, retrying...", false);
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 1500);
      };
    }

    // Initialize connections
    fetchInitialData().then(() => {
      connect();
    });
  </script>
</body>
</html>
