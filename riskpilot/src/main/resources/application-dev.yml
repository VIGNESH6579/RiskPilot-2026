spring:
  datasource:
    url: jdbc:h2:mem:riskpilot-dev
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.riskpilot: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

riskpilot:
  risk:
    max-trades-per-day: 2
  execution:
    slippage:
      entry-max: 2.0
    latency:
      soft-block-ms: 500
  notification:
    ntfy-enabled: false
