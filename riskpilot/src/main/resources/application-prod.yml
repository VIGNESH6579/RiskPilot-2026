spring:
  application:
    name: riskpilot
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:riskpilot;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:password}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
  jackson:
    time-zone: Asia/Kolkata
    date-format: yyyy-MM-dd HH:mm:ss

riskpilot:
  mode: SHADOW
  strict-mode: true
  session:
    timezone: Asia/Kolkata
    start: "09:15"
    end: "15:30"
    opening-range-end: "09:45"
  filters:
    regime-required: TREND_ONLY
    min-or-range: 120
    max-spread: 2.0
  time-phase:
    early:
      start: "09:15"
      end: "12:00"
      position-scale: 1.0
    mid:
      start: "12:00"
      end: "13:30"
      position-scale: 0.35
    late:
      start: "13:30"
      end: "15:30"
      allow-new-trades: false
      force-exit: true
  risk:
    max-trades-per-day: 2
    one-trade-at-a-time: true
    max-daily-loss-r: 1.5
    max-consecutive-losses: 3
  execution:
    slippage:
      entry-max: 2.0
      tp1-max: 3.0
      runner-max: 6.0
      panic-exit-max: 8.0
    latency:
      soft-block-ms: 500
      hard-block-ms: 1500
      panic-ms: 5000
    reject-on-high-slippage: true
    reject-on-latency-breach: true
  extraction:
    tp1:
      enabled: true
      position-size: 0.15
      min-points: 15
      volatility-factor: 0.12
    runner:
      position-size: 0.85
      stage2-activation-r: 0.8
      tail-protection:
        activate-r: 2.0
        pullback-r: 0.5
      momentum-decay:
        enabled: true
        threshold: 0.6
      soft-stop:
        enabled: true
        shift-r: 0.25
  infra:
    feed:
      require-stable: true
      max-missing-ticks: 3
      instability-timeout-sec: 15
      real-time-only: true
      data-source: angelone-live
    heartbeat:
      enabled: true
      panic-exit-on-failure: true
      timeout-sec: 30
    market-data:
      cache-ttl-seconds: 5
      refresh-interval-seconds: 2
      fallback-disabled: true
      mock-disabled: true
  logging:
    csv:
      enabled: true
      path: shadow_live_forward_logs.csv
    decision-log:
      enabled: true
      path: decision_log.csv
    reject-log:
      enabled: true
      path: reject_log.csv
    include:
      - regime
      - volatility
      - gateDecision
      - rejectReason
      - slippage
      - latency
      - mfe
      - mae
      - realizedR
      - timePhase
      - feedStable

angelone:
  api-key: ${ANGELONE_API_KEY:}
  client-code: ${ANGELONE_CLIENT_CODE:}
  password: ${ANGELONE_PASSWORD:}
  totp-secret: ${ANGELONE_TOTP_SECRET:}
  base-url: ${ANGELONE_BASE_URL:https://apiconnect.angelbroking.com}

logging:
  level:
    com.riskpilot: WARN
    org.springframework: ERROR
    root: ERROR
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
  file:
    name: logs/riskpilot.log
    max-size: 5MB
    max-history: 7

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
