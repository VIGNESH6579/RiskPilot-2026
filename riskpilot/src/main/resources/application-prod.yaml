spring:
  application:
    name: riskpilot
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/riskpilot}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.riskpilot: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
  file:
    name: logs/riskpilot.log

angel:
  api:
    key: ${ANGEL_API_KEY:}
    clientcode: ${ANGEL_CLIENT_ID:}
    pin: ${ANGEL_PIN:}
    totp:
      secret: ${ANGEL_TOTP_SECRET:}

riskpilot:
  csv:
    path: ${RISKPILOT_CSV_PATH:shadow_live_forward_logs.csv}
  ntfy:
    topic: ${RISKPILOT_NTFY_TOPIC:riskpilot-live-signals}
    enabled: ${RISKPILOT_ENABLE_NTFY:true}
