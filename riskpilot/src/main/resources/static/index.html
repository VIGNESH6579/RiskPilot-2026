<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RiskPilot Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
        .grid { display: grid; gap: 12px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .card { background: #111827; border: 1px solid #334155; border-radius: 8px; padding: 12px; }
        .label { color: #94a3b8; font-size: 12px; }
        .value { font-size: 20px; margin-top: 5px; font-weight: 700; }
        .panel { margin-top: 14px; background: #111827; border: 1px solid #334155; border-radius: 8px; padding: 12px; }
        .ok { color: #22c55e; }
        .bad { color: #ef4444; }
        .warn { color: #f59e0b; }
        .mono { font-family: Consolas, monospace; }
    </style>
</head>
<body>
<h2>RiskPilot Monitor (Read-Only)</h2>
<div id="wsStatus" class="warn">Socket: Connecting...</div>

<div class="grid">
    <div class="card"><div class="label">Regime</div><div id="regime" class="value">-</div></div>
    <div class="card"><div class="label">Volatility Gate</div><div id="volatilityQualified" class="value">-</div></div>
    <div class="card"><div class="label">Time Phase</div><div id="timePhase" class="value">-</div></div>
    <div class="card"><div class="label">Trade Active</div><div id="tradeActive" class="value">-</div></div>
    <div class="card"><div class="label">Trades Taken</div><div id="tradesTaken" class="value">-</div></div>
    <div class="card"><div class="label">Daily Loss (R)</div><div id="dailyLossR" class="value">-</div></div>
    <div class="card"><div class="label">Feed Stable</div><div id="feedStable" class="value">-</div></div>
    <div class="card"><div class="label">Heartbeat Alive</div><div id="heartbeatAlive" class="value">-</div></div>
    <div class="card"><div class="label">Session Active</div><div id="sessionActive" class="value">-</div></div>
    <div class="card"><div class="label">NIFTY Spot</div><div id="spot" class="value">-</div></div>
    <div class="card"><div class="label">Prev Close</div><div id="prevClose" class="value">-</div></div>
    <div class="card"><div class="label">Nearest Expiry</div><div id="expiry" class="value" style="font-size:16px;">-</div></div>
    <div class="card"><div class="label">Option Chain Health</div><div id="chainHealth" class="value">-</div></div>
    <div class="card"><div class="label">Price Source</div><div id="spotSource" class="value" style="font-size:14px;">-</div></div>
</div>

<div class="panel">
    <div class="label">Last Reject Reason</div>
    <div id="lastRejectReason" class="value mono" style="font-size:14px;">-</div>
</div>

<script>
    const fields = [
        "regime", "volatilityQualified", "timePhase", "tradeActive", "tradesTaken",
        "dailyLossR", "feedStable", "heartbeatAlive", "sessionActive", "lastRejectReason"
    ];

    function render(state) {
        fields.forEach((f) => {
            const el = document.getElementById(f);
            if (!el) return;
            const value = state[f];
            el.textContent = value === null || value === undefined ? "-" : value;
            el.classList.remove("ok", "bad", "warn");
            if (value === true) el.classList.add("ok");
            if (value === false) el.classList.add("bad");
        });
        if (typeof state.tradesTaken === "number" && typeof state.maxTradesPerDay === "number") {
            document.getElementById("tradesTaken").textContent = `${state.tradesTaken} / ${state.maxTradesPerDay}`;
        }
    }

    function refreshState() {
        fetch(`/api/v1/monitor/state?ts=${Date.now()}`, { cache: "no-store" })
            .then((r) => r.json())
            .then((data) => render(data))
            .catch(() => {});
    }

    function refreshOptionChain() {
        fetch(`/api/v1/data/option-chain?ts=${Date.now()}`, { cache: "no-store" })
            .then((r) => r.json())
            .then((data) => {
                const spotEl = document.getElementById("spot");
                const expiryEl = document.getElementById("expiry");
                const healthEl = document.getElementById("chainHealth");
                const sourceEl = document.getElementById("spotSource");
                const prevCloseEl = document.getElementById("prevClose");
                spotEl.textContent = typeof data.spot === "number" ? data.spot.toFixed(2) : "-";
                prevCloseEl.textContent = typeof data.previousClose === "number" ? data.previousClose.toFixed(2) : "-";
                expiryEl.textContent = data.expiry || "-";
                const healthy = data.spot && data.spot > 0;
                const source = data.source || "UNKNOWN";
                healthEl.textContent = healthy ? (source === "PREV_CLOSE_CACHE" ? "MARKET_CLOSED" : "LIVE") : "STALE";
                sourceEl.textContent = source;
                healthEl.classList.remove("ok", "bad");
                sourceEl.classList.remove("ok", "bad");
                healthEl.classList.add(healthy ? "ok" : "bad");
                sourceEl.classList.add(source === "PREV_CLOSE_CACHE" ? "warn" : "ok");
            })
            .catch(() => {
                const healthEl = document.getElementById("chainHealth");
                const sourceEl = document.getElementById("spotSource");
                healthEl.textContent = "DOWN";
                sourceEl.textContent = "UNAVAILABLE";
                healthEl.classList.remove("ok");
                sourceEl.classList.remove("ok");
                healthEl.classList.add("bad");
                sourceEl.classList.add("bad");
            });
    }

    let stompClient = null;
    let reconnectTimer = null;

    function connectSocket() {
        const socket = new SockJS("/ws");
        stompClient = Stomp.over(socket);
        stompClient.debug = () => {};
        stompClient.connect({}, () => {
            document.getElementById("wsStatus").textContent = "Socket: Connected";
            document.getElementById("wsStatus").className = "ok";
            stompClient.subscribe("/topic/session", (message) => {
                render(JSON.parse(message.body));
            });
        }, () => {
            document.getElementById("wsStatus").textContent = "Socket: Disconnected (retrying)";
            document.getElementById("wsStatus").className = "bad";
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(connectSocket, 2000);
        });
    }

    refreshState();
    refreshOptionChain();
    connectSocket();
    setInterval(refreshState, 5000);
    setInterval(refreshOptionChain, 3000);
</script>
</body>
</html>
