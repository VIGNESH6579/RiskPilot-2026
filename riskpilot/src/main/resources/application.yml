server:
  port: 8080

spring:
  application:
    name: riskpilot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:riskpilot}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:password}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
  websocket:
    message-broker:
      application-prefix: /app
      user-prefix: /user
  jackson:
    time-zone: Asia/Kolkata
    date-format: yyyy-MM-dd HH:mm:ss

riskpilot:
  mode: SHADOW
  strict-mode: true
  session:
    timezone: ${TRADING_TIMEZONE:Asia/Kolkata}
    start: ${SESSION_START:09:15}
    end: ${SESSION_END:15:30}
    opening-range-end: ${OPENING_RANGE_END:09:45}
  filters:
    regime-required: TREND_ONLY
    min-or-range: 120
    max-spread: 2.0
  time-phase:
    early:
      start: "09:15"
      end: "12:00"
      position-scale: 1.0
    mid:
      start: "12:00"
      end: "13:30"
      position-scale: 0.35
    late:
      start: "13:30"
      end: "15:30"
      allow-new-trades: false
      force-exit: true
  risk:
    max-trades-per-day: ${MAX_TRADES_PER_DAY:2}
    one-trade-at-a-time: true
    max-daily-loss-r: 1.5
    max-consecutive-losses: 3
  execution:
    slippage:
      entry-max: ${SLIPPAGE_ENTRY:2.0}
      tp1-max: 3.0
      runner-max: 6.0
      panic-exit-max: 8.0
    latency:
      soft-block-ms: 500
      hard-block-ms: 1500
      panic-ms: 5000
    reject-on-high-slippage: true
    reject-on-latency-breach: true
  infra:
    feed:
      require-stable: true
      max-missing-ticks: 3
      instability-timeout-sec: 15
      real-time-only: true
      data-source: angelone-live
    heartbeat:
      enabled: true
      panic-exit-on-failure: true
      timeout-sec: 30
    market-data:
      cache-ttl-seconds: 5
      refresh-interval-seconds: 2
      fallback-disabled: true
      mock-disabled: true
  notification:
    ntfy-enabled: ${NTFY_ENABLED:false}
    ntfy-topic: ${NTFY_TOPIC:riskpilot_shadow_alerts}
    ntfy-cooldown-sec: ${NTFY_COOLDOWN_SEC:10}

angelone:
  api-key: ${ANGELONE_API_KEY:}
  client-code: ${ANGELONE_CLIENT_CODE:}
  password: ${ANGELONE_PASSWORD:}
  totp-secret: ${ANGELONE_TOTP_SECRET:}
  base-url: ${ANGELONE_BASE_URL:https://apiconnect.angelbroking.com}

logging:
  level:
    com.riskpilot: ${LOG_LEVEL:INFO}
    org.springframework.web: ${WEB_LOG_LEVEL:WARN}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/riskpilot.log}
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
