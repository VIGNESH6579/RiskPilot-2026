services:
  - type: web
    name: riskpilot-2026
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/v1/monitor/state
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75
      - key: OBSERVER_PORT
        value: "8765"
      - key: OBSERVER_HOST
        value: "127.0.0.1"
