services:
  - type: web
    name: riskpilot-2026
    runtime: docker
    plan: free
    dockerfilePath: ./riskpilot/Dockerfile
    dockerContext: ./riskpilot
    autoDeployTrigger: commit
    healthCheckPath: /api/v1/health/state
    envVars:
      - key: JAVA_OPTS
        value: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:+UseStringDeduplication"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
